AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GitHub Actions OIDC identity provider and IAM role for Cubed Lithops runtime builds.
  Creates a role that GitHub Actions can assume (via OIDC) to build and deploy
  Cubed Lambda container runtimes on your behalf.

Parameters:
  GitHubOrg:
    Type: String
    Description: Your GitHub organisation or username (e.g. myorg)

  GitHubRepo:
    Type: String
    Description: Your repository name, without the org prefix (e.g. my-lithops-runtime)

  CreateOIDCProvider:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >
      Set to false if a GitHub Actions OIDC provider already exists in this account
      — each AWS account can only have one.

Conditions:
  ShouldCreateOIDCProvider: !Equals [!Ref CreateOIDCProvider, 'true']

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  LithopsGitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cubed-lithops-github-actions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      Policies:
        - PolicyName: LithopsRuntimeBuilder
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuth
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: ECRRepository
                Effect: Allow
                Action:
                  - ecr:CreateRepository
                  - ecr:DescribeRepositories
                  - ecr:DescribeImages
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:TagResource
                  - ecr:SetRepositoryPolicy
                Resource: !Sub 'arn:aws:ecr:*:${AWS::AccountId}:repository/*'
              - Sid: STS
                Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'
              - Sid: Lambda
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:ListFunctions
                  - lambda:TagResource
                  - lambda:InvokeFunction
                  - lambda:ListTags
                Resource: '*'
              - Sid: S3
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:PutBucketCORS
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:DeleteBucket
                Resource: '*'
              - Sid: IAMPassRole
                Effect: Allow
                Action: iam:PassRole
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:PassedToService: lambda.amazonaws.com

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cubed-lithops-lambda-execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CubedLithopsLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuth
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: ECRPull
                Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: !Sub 'arn:aws:ecr:*:${AWS::AccountId}:repository/*'
              - Sid: S3
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:PutBucketCORS
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:DeleteBucket
                Resource: '*'

Outputs:
  GitHubActionsRoleArn:
    Description: Paste this value as the AWS_ROLE_ARN secret in your GitHub repository
    Value: !GetAtt LithopsGitHubActionsRole.Arn

  LambdaExecutionRoleArn:
    Description: Paste this value as execution_role in .lithops/config
    Value: !GetAtt LambdaExecutionRole.Arn

  GitHubActionsRoleId:
    Description: Paste this value as user_id in .lithops/config
    Value: !GetAtt LithopsGitHubActionsRole.RoleId
